<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thali Importados — Perfumes & Cosméticos</title>
<meta name="description" content="Perfumes árabes importados, body splashs e cosméticos. Curitiba e região.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#7A1A1A;--dred:#5C1010;--gold:#C5A55A;--goldL:#D4B96E;--goldP:#E8D5A0;--cream:#FDF8F0;--dark:#1A0A0A;--txt:#2C1810;--txtL:#6B5B50;--wht:#FFFDF9}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--txt);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ═══ LOADING ═══ */
#loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dred);color:var(--gold);font-family:'Playfair Display',serif}
#loading h1{font-size:42px}
#loading p{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--goldP);opacity:.6;margin-top:8px}
#loading .spin{margin-top:24px;width:30px;height:30px;border:2px solid rgba(197,165,90,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ═══ HERO ═══ */
.hero{min-height:100vh;background:linear-gradient(165deg,var(--dred),var(--red) 40%,#8B1A1A);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;position:relative}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(197,165,90,.03) 40px,rgba(197,165,90,.03) 41px);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:120px;background:linear-gradient(to top,var(--cream),transparent);pointer-events:none}
.hero>*{position:relative;z-index:1}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,8vw,5.5rem);color:var(--gold);letter-spacing:.02em;animation:fu 1s ease-out both}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(.85rem,2vw,1.1rem);color:var(--goldP);letter-spacing:.35em;text-transform:uppercase;margin-top:8px;font-weight:300;animation:fu 1s ease-out .2s both}
.hero-tag{font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(232,213,160,.6);margin-top:16px;font-size:clamp(.9rem,1.8vw,1.15rem);animation:fu 1s ease-out .4s both}
.hero-btns{margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fu 1s ease-out .6s both}
.btn-gold{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,var(--gold),var(--goldL));color:var(--dred);font-weight:700;font-size:14px;letter-spacing:.08em;text-transform:uppercase;border:none;position:relative;overflow:hidden}
.btn-gold::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transition:left .5s}
.btn-gold:hover::before{left:100%}
.btn-out{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:transparent;color:var(--gold);font-weight:500;font-size:14px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--gold)}
.btn-out:hover{background:rgba(197,165,90,.1)}
.hero-social{margin-top:40px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap;animation:fu 1s ease-out .8s both}
.hero-social a{color:var(--goldP);font-size:14px;display:flex;align-items:center;gap:6px;transition:color .3s}
.hero-social a:hover{color:var(--gold)}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ═══ NAV ═══ */
.nav{position:sticky;top:0;z-index:100;background:var(--wht);border-bottom:1px solid rgba(197,165,90,.2);display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-brand{font-family:'Playfair Display',serif;font-size:18px;color:var(--red);padding:14px 20px;white-space:nowrap;border-right:1px solid rgba(197,165,90,.2);flex-shrink:0}
.nav-link{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--txtL);padding:16px 20px;white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;flex-shrink:0;transition:all .3s;background:none;border-top:none;border-left:none;border-right:none}
.nav-link:hover,.nav-link.act{color:var(--red);border-bottom-color:var(--gold)}
.nav-admin{margin-left:auto;font-size:12px;font-weight:700;color:var(--gold);padding:16px 20px;cursor:pointer;white-space:nowrap;flex-shrink:0;background:none;border:none}
.nav-search-wrap{position:relative;display:flex;align-items:center;padding:8px 10px;flex-shrink:0}
.nav-search{padding:8px 12px 8px 32px;border:1px solid rgba(197,165,90,.3);font-size:13px;font-family:inherit;background:var(--cream);outline:none;width:180px;transition:border-color .3s}
.nav-search:focus{border-color:var(--gold)}
@media(max-width:768px){.nav-search{width:130px}}
@media(max-width:480px){.nav-search-wrap{display:none}}

/* ═══ SECTIONS ═══ */
.sec{max-width:1200px;margin:0 auto;padding:60px 16px}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:8px}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.5rem);color:var(--red);text-align:center;font-weight:400}
.sec-div{width:60px;height:1px;background:var(--gold);margin:16px auto 40px}
.sec-alt{background:rgba(197,165,90,.04)}

/* ═══ GRID ═══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
@media(max-width:480px){.grid{grid-template-columns:1fr 1fr;gap:10px}}

/* ═══ CARD ═══ */
.card{background:var(--wht);border:1px solid rgba(197,165,90,.15);display:flex;flex-direction:column;position:relative;overflow:hidden;transition:all .4s}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(122,26,26,.1)}
.badge{position:absolute;top:10px;left:10px;z-index:2;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px}
.card-img{width:100%;aspect-ratio:1/1;overflow:hidden;background:#f5f0ea;position:relative}
.card-img img,.card-img video{width:100%;height:100%;object-fit:cover}
.card-info{padding:16px;flex:1;display:flex;flex-direction:column}
@media(max-width:480px){.card-info{padding:10px}.card-info .p-desc,.card-info .tags{display:none}}
.p-brand{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.p-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--txt);margin-bottom:6px;line-height:1.3;font-weight:400}
@media(max-width:480px){.p-name{font-size:14px}}
.p-desc{font-size:13px;color:var(--txtL);line-height:1.5;margin-bottom:8px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:10px;font-weight:600;padding:3px 8px;border:1px solid rgba(197,165,90,.3);color:var(--txtL)}
.card-foot{margin-top:auto;padding-top:10px;border-top:1px solid rgba(197,165,90,.12);display:flex;align-items:center;justify-content:space-between}
.price{font-family:'Playfair Display',serif;color:var(--red);font-weight:700;display:flex;align-items:baseline;gap:2px}
.price-symbol{font-size:14px;font-weight:600;font-family:'Montserrat',sans-serif}
.price-value{font-size:22px}
.price-consult{font-size:16px;font-style:italic;color:var(--txtL);font-family:'Cormorant Garamond',serif}
@media(max-width:480px){.price-value{font-size:16px}.price-symbol{font-size:11px}}
.btn-wa{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#25D366;color:#fff;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none}
.btn-wa:hover{background:#1fb855}
@media(max-width:480px){.btn-wa{padding:6px 8px;font-size:10px}}

/* ═══ GALLERY ═══ */
.gal{position:relative;width:100%;height:100%}
.gal-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f0ea,#ebe3d5);color:var(--gold)}
.gal-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.gal-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.7);cursor:pointer;padding:0}
.gal-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);color:#fff;border:none;width:28px;height:28px;font-size:16px}
.gal-arr.l{left:4px}
.gal-arr.r{right:4px}

/* ═══ ABOUT ═══ */
.about{background:linear-gradient(165deg,var(--dred),var(--red));padding:60px 20px;text-align:center;position:relative}
.about::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(197,165,90,.03) 40px,rgba(197,165,90,.03) 41px);pointer-events:none}
.about>*{position:relative}
.about .sec-label{color:var(--goldL)}
.about .sec-title{color:var(--gold)}
.about-text{font-family:'Cormorant Garamond',serif;font-size:17px;line-height:1.8;color:var(--goldP);max-width:700px;margin:24px auto 0;opacity:.85}

/* ═══ FOOTER ═══ */
.ft{background:var(--dark);padding:36px 20px;text-align:center}
.ft-brand{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold)}
.ft-sub{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--goldP);opacity:.5;margin-top:4px}
.ft-links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.ft-links a{color:rgba(232,213,160,.5);font-size:13px;display:flex;align-items:center;gap:6px;transition:color .3s}
.ft-links a:hover{color:var(--gold)}
.ft-copy{font-size:11px;color:rgba(232,213,160,.25);margin-top:16px}

/* ═══ FLOAT WA ═══ */
.float-wa{position:fixed;bottom:24px;right:24px;z-index:1000;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.4);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.4)}50%{box-shadow:0 4px 30px rgba(37,211,102,.6),0 0 0 10px rgba(37,211,102,.1)}}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:12px 28px;font-weight:600;font-size:14px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:opacity .3s}

/* ═══ ADMIN ═══ */
.admin{min-height:100vh;background:#F5F0EA}
.admin-bar{background:var(--dark);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:8px}
.admin-title{color:var(--gold);font-family:'Playfair Display',serif;font-size:18px}
.admin-bar-btns{display:flex;gap:10px}
.admin-btn{padding:8px 20px;font-weight:600;font-size:13px;border:none}
.admin-btn.primary{background:var(--gold);color:var(--dark)}
.admin-btn.secondary{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.admin-body{padding:20px;max-width:1200px;margin:0 auto}
.admin-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.admin-filter{padding:8px 16px;border:none;font-size:12px;font-weight:600}
.admin-filter.act{background:var(--red);color:var(--gold)}
.admin-filter:not(.act){background:#f5f0ea;color:var(--txtL)}
.admin-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px}
.admin-search{padding:10px 12px;border:1px solid #d5ccc0;font-size:14px;background:#FDFBF7;outline:none;width:200px;font-family:inherit}
.admin-add{padding:10px 20px;background:var(--red);color:var(--gold);border:none;font-size:13px;font-weight:700}
.admin-help{font-size:13px;color:var(--txtL);margin-bottom:16px;line-height:1.6;background:#fff;padding:14px;border:1px solid #e0d5c5}

/* Admin Card */
.adm-card{background:#fff;border:1px solid #e0d5c5;margin-bottom:16px;padding:20px}
.adm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.adm-head-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--red)}
.adm-head-actions{display:flex;gap:8px;align-items:center}
.adm-dirty{font-size:11px;color:#e67e22;font-weight:600}
.adm-save{padding:8px 20px;color:#fff;border:none;font-size:13px;font-weight:600}
.adm-save.dirty{background:#27ae60}
.adm-save:not(.dirty){background:#95a5a6}
.adm-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.adm-field{flex:1;min-width:200px}
.adm-field.sm{flex:0;width:180px;min-width:auto}
.adm-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:4px}
.adm-input{width:100%;padding:10px 12px;border:1px solid #d5ccc0;font-size:14px;font-family:inherit;background:#FDFBF7;outline:none}
.adm-textarea{width:100%;padding:10px 12px;border:1px solid #d5ccc0;font-size:14px;font-family:inherit;background:#FDFBF7;outline:none;min-height:60px;resize:vertical}
.adm-select{width:100%;padding:10px 12px;border:1px solid #d5ccc0;font-size:14px;font-family:inherit;background:#FDFBF7;outline:none}
.adm-media-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.adm-thumb-wrap{position:relative}
.adm-thumb{width:80px;height:80px;object-fit:cover;border:1px solid #d5ccc0}
.adm-thumb-rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#c0392b;color:#fff;border:none;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.adm-media-btns{display:flex;flex-direction:column;gap:4px}
.adm-media-btn{width:80px;height:38px;border:none;font-size:11px;font-weight:600;cursor:pointer}
.adm-media-btn.upload{background:var(--red);color:var(--gold)}
.adm-media-btn.url{background:#5C4033;color:var(--goldP)}
.adm-media-hint{font-size:11px;color:#999;margin-top:6px}
.adm-prop-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.adm-prop-input{padding:8px 10px;border:1px solid #d5ccc0;font-size:13px;font-family:inherit;background:#FDFBF7;outline:none;flex:1}
.adm-prop-input.key{flex:.4}
.adm-prop-input.val{flex:.6}
.adm-prop-rm{background:none;border:none;color:#c0392b;font-size:18px;padding:0 4px;flex-shrink:0}
.adm-prop-add{padding:6px 14px;background:var(--red);color:var(--gold);border:none;font-size:12px;font-weight:600}
.adm-foot{border-top:1px solid #e0d5c5;padding-top:12px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.adm-id{font-size:11px;color:#bbb}
.adm-del{padding:8px 16px;background:#c0392b;color:#fff;border:none;font-size:12px;font-weight:600}
</style>
</head>
<body>

<div id="loading">
  <h1>Thali</h1>
  <p>Importados</p>
  <div class="spin"></div>
</div>

<div id="app" style="display:none"></div>

<script>
/* ═══════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════ */
const SB_URL = "https://awtqncizgngoaevckrdp.supabase.co";
const SB_KEY = "sb_publishable_Y6oemHYEodymwwJ3_cOOYg_ujUzfV1D";
const WA = "5541998640104";
const waUrl = m => `https://wa.me/${WA}?text=${encodeURIComponent(m)}`;

const CATS = [
  { id:"fem", label:"Perfumes Femininos", badge:"Feminino", bg:"#7A1A1A", fg:"#C5A55A" },
  { id:"masc", label:"Perfumes Masculinos", badge:"Masculino", bg:"#1A0A0A", fg:"#C5A55A" },
  { id:"splash", label:"Body Splash & Loções", badge:"Kit", bg:"#C5A55A", fg:"#5C1010" },
  { id:"cuidados", label:"Cuidados & Beleza", badge:"Cuidados", bg:"#5C4033", fg:"#E8D5A0" },
];

const hdrs = { apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`, "Content-Type":"application/json", Prefer:"return=representation" };

/* ═══ API ═══ */
async function api(path, opts={}) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers:{...hdrs,...(opts.headers||{})}, ...opts });
  if (!r.ok) throw new Error(await r.text());
  const ct = r.headers.get("content-type");
  return (ct && ct.includes("json")) ? r.json() : null;
}

async function uploadFile(file) {
  const ext = file.name.split(".").pop();
  const name = `${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const r = await fetch(`${SB_URL}/storage/v1/object/product-images/${name}`, {
    method:"POST", headers:{ apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`, "Content-Type":file.type }, body:file
  });
  if (!r.ok) throw new Error(await r.text());
  return `${SB_URL}/storage/v1/object/public/product-images/${name}`;
}

async function deleteFile(url) {
  const name = url.split("/product-images/").pop();
  if (!name) return;
  await fetch(`${SB_URL}/storage/v1/object/product-images/${name}`, {
    method:"DELETE", headers:{ apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}` }
  }).catch(()=>{});
}

async function loadAll() {
  const [products, media, props] = await Promise.all([
    api("products?select=*&order=category,sort_order"),
    api("product_media?select=*&order=sort_order"),
    api("product_props?select=*&order=sort_order"),
  ]);
  return products.map(p => ({
    ...p,
    media: media.filter(m => m.product_id === p.id),
    props: props.filter(pr => pr.product_id === p.id),
  }));
}

/* ═══ GALLERY STATE ═══ */
const galState = {};

function galIdx(pid) { return galState[pid] || 0; }
function galSet(pid, i) { galState[pid] = i; renderApp(); }

/* ═══ TOAST ═══ */
function showToast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById("toast");
  if (el) { el.textContent = msg; el.style.display = "block"; }
  toastTimer = setTimeout(() => { if (el) el.style.display = "none"; }, 2500);
}

/* ═══ RENDER: GALLERY ═══ */
function renderGallery(media, pid) {
  if (!media || !media.length) return `<div class="gal-placeholder">${placeholderSvg}<span style="font-size:11px;margin-top:8px;opacity:.45">Sem imagem</span></div>`;
  const i = Math.min(galIdx(pid), media.length - 1);
  const cur = media[i];
  const isVid = cur.media_type === "video";
  let html = `<div class="gal">`;
  html += isVid ? `<video src="${cur.url}" controls style="width:100%;height:100%;object-fit:cover"></video>` : `<img src="${cur.url}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`;
  if (media.length > 1) {
    html += `<div class="gal-dots">${media.map((_, j) => `<button class="gal-dot" style="background:${j===i?'#C5A55A':'rgba(0,0,0,.3)'}" onclick="galSet('${pid}',${j})"></button>`).join("")}</div>`;
    const prev = i > 0 ? i-1 : media.length-1;
    const next = i < media.length-1 ? i+1 : 0;
    html += `<button class="gal-arr l" onclick="galSet('${pid}',${prev})">‹</button>`;
    html += `<button class="gal-arr r" onclick="galSet('${pid}',${next})">›</button>`;
  }
  html += `</div>`;
  return html;
}

function renderCard(p) {

    <div class="adm-row">

/* ═══ ADMIN ACTIONS ═══ */
function setField(pid, field, value) {
  const p = products.find(x => x.id === pid);
  if (p) { p[field] = value; p._dirty = true; renderApp(); }
}

function setProp(pid, idx, field, value) {
  const p = products.find(x => x.id === pid);
  if (p && p.props && p.props[idx]) { p.props[idx][field] = value; p._dirty = true; }
}

function addProp(pid) {
  const p = products.find(x => x.id === pid);
  if (p) { p.props = [...(p.props||[]), { id:"new_"+Date.now(), prop_key:"", prop_value:"", product_id:pid }]; p._dirty = true; renderApp(); }
}

function rmProp(pid, idx) {
  const p = products.find(x => x.id === pid);
  if (p) { p.props = p.props.filter((_,i) => i !== idx); p._dirty = true; renderApp(); }
}

async function saveProduct(pid) {
  const p = products.find(x => x.id === pid);
  if (!p) return;
  p._saving = true; renderApp();
  try {
    await api(`products?id=eq.${pid}`, { method:"PATCH", body:JSON.stringify({ name:p.name, brand:p.brand, description:p.description, price:p.price, category:p.category, sort_order:p.sort_order||0 }) });
    await api(`product_props?product_id=eq.${pid}`, { method:"DELETE" });
    const validProps = (p.props||[]).filter(pr => pr.prop_key);
    if (validProps.length) {
      await api("product_props", { method:"POST", body:JSON.stringify(validProps.map((pr,i) => ({ product_id:pid, prop_key:pr.prop_key, prop_value:pr.prop_value, sort_order:i }))) });
    }
    p._dirty = false;
    showToast("Salvo com sucesso!");
    await reloadAndRender();
  } catch(e) { alert("Erro ao salvar: " + e.message); }
  p._saving = false; renderApp();
}

async function addProduct() {
  const cat = adminFilter !== "all" ? adminFilter : "fem";
  try {
    await api("products", { method:"POST", body:JSON.stringify({ name:"", brand:"", description:"", price:"", category:cat, sort_order:0 }) });
    showToast("Produto criado!");
    await reloadAndRender();
  } catch(e) { alert("Erro: " + e.message); }
}

async function deleteProduct(pid) {
  const p = products.find(x => x.id === pid);
  if (!confirm("Excluir " + (p?.name || "este produto") + "?")) return;
  try {
    // Delete media files from storage
    for (const m of (p?.media||[])) {
      if (m.url.includes(SB_URL)) await deleteFile(m.url);
    }
    await api(`products?id=eq.${pid}`, { method:"DELETE" });
    showToast("Excluído!");
    await reloadAndRender();
  } catch(e) { alert("Erro: " + e.message); }
}

async function handleUpload(pid, input) {
  const files = Array.from(input.files);
  input.value = "";
  for (const file of files) {
    try {
      showToast("Enviando " + file.name + "...");
      const url = await uploadFile(file);
      const isVid = file.type.startsWith("video");
      const p = products.find(x => x.id === pid);
      await api("product_media", { method:"POST", body:JSON.stringify({ product_id:pid, url, media_type:isVid?"video":"image", sort_order:(p?.media?.length||0) }) });
      showToast("Foto adicionada!");
      await reloadAndRender();
    } catch(e) { alert("Erro no upload: " + e.message); }
  }
}

async function addMediaUrl(pid) {
  const url = prompt("Cole a URL da imagem ou vídeo:");
  if (!url) return;
  const isVid = /\.(mp4|webm|ogg|mov)/i.test(url);
  try {
    const p = products.find(x => x.id === pid);
    await api("product_media", { method:"POST", body:JSON.stringify({ product_id:pid, url, media_type:isVid?"video":"image", sort_order:(p?.media?.length||0) }) });
    showToast("Mídia adicionada!");
    await reloadAndRender();
  } catch(e) { alert("Erro: " + e.message); }
}

async function removeMedia(pid, mid, url) {
  if (url.includes(SB_URL)) await deleteFile(url);
  await api(`product_media?id=eq.${mid}`, { method:"DELETE" });
  showToast("Removido!");
  await reloadAndRender();
}

/* ═══ ADMIN LOGIN ═══ */
function openAdmin() {
  if (adminAuth) { currentView = "admin"; renderApp(); return; }
  currentView = "login"; renderApp();
}

function tryLogin() {
  const inp = document.getElementById("admin-pass");
  if (inp && inp.value === ADMIN_PASS) {
    adminAuth = true;
    currentView = "admin";
    renderApp();
  } else {
    const err = document.getElementById("login-error");
    if (err) { err.style.display = "block"; }
    if (inp) { inp.value = ""; inp.focus(); }
  }
}

function renderLogin() {
  return `
  <div style="min-height:100vh;background:linear-gradient(165deg,var(--dred),var(--red));display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--wht);padding:48px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-family:'Playfair Display',serif;font-size:32px;color:var(--red);margin-bottom:4px">Thali</div>
      <div style="font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:32px">Painel Administrativo</div>
      <div style="text-align:left;margin-bottom:8px">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:6px">Senha de acesso</div>
        <input id="admin-pass" type="password" style="width:100%;padding:14px 16px;border:1px solid #d5ccc0;font-size:16px;font-family:inherit;background:#FDFBF7;outline:none" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter')tryLogin()">
      </div>
      <div id="login-error" style="display:none;color:#c0392b;font-size:13px;margin:8px 0;font-weight:600">Senha incorreta. Tente novamente.</div>
      <button onclick="tryLogin()" style="width:100%;padding:14px;background:var(--red);color:var(--gold);border:none;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:12px;cursor:pointer">Entrar</button>
      <button onclick="currentView='store';renderApp()" style="width:100%;padding:12px;background:transparent;color:var(--txtL);border:none;font-size:13px;margin-top:12px;cursor:pointer">← Voltar para a loja</button>
    </div>
  </div>`;
}

/* ═══ RENDER APP ═══ */
function renderApp() {
  const app = document.getElementById("app");
  if (currentView === "login") { app.innerHTML = renderLogin(); }
  else if (currentView === "admin") { app.innerHTML = renderAdmin(); }
  else { app.innerHTML = renderStore(); }
  app.style.display = "block";
  document.getElementById("loading").style.display = "none";
}

async function reloadAndRender() {
  try {
    products = await loadAll();
    renderApp();
  } catch(e) {
    console.error(e);
    showToast("Erro ao carregar dados");
  }
}

/* ═══ INIT ═══ */
(async () => {
  try {
    products = await loadAll();
    renderApp();
  } catch(e) {
    document.getElementById("loading").innerHTML = `<h1>Thali</h1><p style="margin-top:16px;color:#E8D5A0">Erro ao conectar com o servidor</p><p style="margin-top:8px;font-size:12px;color:rgba(232,213,160,.5)">${e.message}</p>`;
  }
})();
</script>
</body>
</html>
